<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Footage - Traffic AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background: #0f1017; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="min-height: 100vh; display: flex; flex-direction: column;">
        <!-- Header -->
        <header class="main-header">
            <h1>Live Detection Footage</h1>
            <div class="header-actions">
                <a href="/" style="color: #a78bfa; text-decoration: none; padding: 8px 16px; border: 1px solid #a78bfa; border-radius: 8px; transition: all 0.2s;">
                    ← Back to Dashboard
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main style="flex: 1; padding: 32px; display: flex; flex-direction: column; gap: 24px;">
            <!-- Direction Selector -->
            <section style="text-align: center;">
                <div style="display: inline-flex; gap: 12px; background: #1a1b2e; padding: 12px; border-radius: 12px; box-shadow: 0 2px 16px #7c3aed22;">
                    <button class="video-switch-btn active" data-dir="north">North</button>
                    <button class="video-switch-btn" data-dir="south">South</button>
                    <button class="video-switch-btn" data-dir="east">East</button>
                    <button class="video-switch-btn" data-dir="west">West</button>
                </div>
            </section>

            <!-- Video Display -->
            <section style="display: flex; justify-content: center; align-items: center; flex: 1;">
                <div style="max-width: 1200px; width: 100%; background: #1a1b2e; border-radius: 18px; padding: 24px; box-shadow: 0 4px 24px #7c3aed22;">
                    <div id="current-direction-label" style="text-align: center; font-size: 24px; font-weight: bold; color: #a78bfa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px;">
                        North Direction
                    </div>
                    <div style="text-align: center; position: relative;">
                        <img id="detection-video" 
                             src="/video_feed_north" 
                             style="width: 100%; max-width: 900px; height: auto; border-radius: 12px; box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);" 
                             alt="Detection Feed" />
                    </div>
                    
                    <!-- Stats Row -->
                    <div style="display: flex; justify-content: space-around; margin-top: 24px; gap: 16px; flex-wrap: wrap;">
                        <div class="metric-card" style="flex: 1; min-width: 200px;">
                            <h3 style="margin: 0 0 8px 0; color: #9ca3af; font-size: 14px; font-weight: 500;">Active Direction</h3>
                            <p id="stat-direction" style="margin: 0; font-size: 28px; font-weight: bold; color: #a78bfa;">North</p>
                        </div>
                        <div class="metric-card" style="flex: 1; min-width: 200px;">
                            <h3 style="margin: 0 0 8px 0; color: #9ca3af; font-size: 14px; font-weight: 500;">Detection Status</h3>
                            <p style="margin: 0; font-size: 28px; font-weight: bold; color: #10b981;">Active</p>
                        </div>
                        <div class="metric-card" style="flex: 1; min-width: 200px;">
                            <h3 style="margin: 0 0 8px 0; color: #9ca3af; font-size: 14px; font-weight: 500;">Model</h3>
                            <p style="margin: 0; font-size: 28px; font-weight: bold; color: #a78bfa;">YOLOv8n</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- All Directions Grid View (Optional) -->
            <section style="margin-top: 32px;">
                <h2 style="text-align: center; color: #fff; margin-bottom: 24px;">All Directions</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px;">
                    <div class="video-card-detection">
                        <h3 style="color: #a78bfa; margin-bottom: 12px; text-align: center;">North</h3>
                        <img src="/video_feed_north" style="width: 100%; border-radius: 12px;" alt="North Feed">
                    </div>
                    <div class="video-card-detection">
                        <h3 style="color: #a78bfa; margin-bottom: 12px; text-align: center;">South</h3>
                        <img src="/video_feed_south" style="width: 100%; border-radius: 12px;" alt="South Feed">
                    </div>
                    <div class="video-card-detection">
                        <h3 style="color: #a78bfa; margin-bottom: 12px; text-align: center;">East</h3>
                        <img src="/video_feed_east" style="width: 100%; border-radius: 12px;" alt="East Feed">
                    </div>
                    <div class="video-card-detection">
                        <h3 style="color: #a78bfa; margin-bottom: 12px; text-align: center;">West</h3>
                        <img src="/video_feed_west" style="width: 100%; border-radius: 12px;" alt="West Feed">
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Direction switching
        document.querySelectorAll('.video-switch-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const dir = this.dataset.dir;
                document.getElementById('detection-video').src = '/video_feed_' + dir;
                document.getElementById('current-direction-label').textContent = dir.charAt(0).toUpperCase() + dir.slice(1) + ' Direction';
                document.getElementById('stat-direction').textContent = dir.charAt(0).toUpperCase() + dir.slice(1);
                
                // Update active button
                document.querySelectorAll('.video-switch-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
